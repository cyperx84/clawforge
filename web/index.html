<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClawForge Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
  .header h1 span { font-size: 24px; }
  .header-meta { display: flex; gap: 16px; color: var(--muted); font-size: 13px; }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; padding: 20px 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; text-align: center;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.running .value { color: var(--accent); }
  .stat-card.done .value { color: var(--green); }
  .stat-card.failed .value { color: var(--red); }
  .stat-card.cost .value { color: var(--yellow); }

  .container { padding: 0 24px 24px; }
  .section-title {
    font-size: 14px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin: 20px 0 12px; display: flex;
    align-items: center; gap: 8px;
  }
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 18px; cursor: pointer; transition: all 0.15s;
    display: grid; grid-template-columns: 48px 1fr auto; gap: 12px; align-items: center;
  }
  .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .task-id {
    font-size: 18px; font-weight: 700; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .task-info h3 { font-size: 15px; font-weight: 500; }
  .task-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; margin-top: 4px; }
  .task-meta span { display: flex; align-items: center; gap: 4px; }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge.running { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge.done { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.failed, .badge.timeout { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge.spawned { background: rgba(188,140,255,0.15); color: var(--purple); }
  .badge.cancelled { background: rgba(139,148,158,0.15); color: var(--muted); }

  .preview-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 45%;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.25s ease;
    z-index: 100; display: flex; flex-direction: column;
  }
  .preview-panel.open { transform: translateX(0); }
  .preview-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .preview-header h2 { font-size: 16px; }
  .preview-close {
    background: none; border: none; color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px 8px;
  }
  .preview-close:hover { color: var(--text); }
  .preview-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .preview-output {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
    white-space: pre-wrap; color: var(--green); line-height: 1.4;
    max-height: 300px; overflow-y: auto;
  }
  .preview-detail { margin-bottom: 12px; }
  .preview-detail .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .preview-detail .value { font-size: 14px; margin-top: 2px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .task-card { grid-template-columns: 40px 1fr; }
    .task-card .badge { grid-column: 2; }
    .preview-panel { width: 100%; }
    .header { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>🔧</span> ClawForge Dashboard</h1>
  <div class="header-meta">
    <span id="uptime">—</span>
    <span id="last-update">—</span>
    <span id="connection" class="pulse">●</span>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="container">
  <div class="section-title">Tasks</div>
  <div class="filter-bar" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="running">Running</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="failed">Failed</button>
  </div>
  <div class="task-list" id="task-list"></div>
</div>

<div class="preview-panel" id="preview-panel">
  <div class="preview-header">
    <h2 id="preview-title">Task Details</h2>
    <button class="preview-close" onclick="closePreview()">✕</button>
  </div>
  <div class="preview-body" id="preview-body"></div>
</div>

<script>
let currentFilter = 'all';
let tasks = [];

function formatDuration(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}

function renderStats(stats) {
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="value">${stats.total}</div><div class="label">Total</div></div>
    <div class="stat-card running"><div class="value">${stats.running}</div><div class="label">Running</div></div>
    <div class="stat-card done"><div class="value">${stats.done}</div><div class="label">Done</div></div>
    <div class="stat-card failed"><div class="value">${stats.failed}</div><div class="label">Failed</div></div>
    <div class="stat-card cost"><div class="value">$${stats.totalCost.toFixed(2)}</div><div class="label">Cost</div></div>
  `;
}

function renderTasks(taskList) {
  const filtered = currentFilter === 'all' ? taskList :
    taskList.filter(t => currentFilter === 'failed' ? (t.status === 'failed' || t.status === 'timeout') : t.status === currentFilter);

  if (filtered.length === 0) {
    document.getElementById('task-list').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔧</div>
        <p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}tasks</p>
      </div>`;
    return;
  }

  document.getElementById('task-list').innerHTML = filtered.map(t => `
    <div class="task-card" onclick="openPreview('${t.id}')">
      <div class="task-id">#${t.short_id || '—'}</div>
      <div class="task-info">
        <h3>${esc(t.description || '—')}</h3>
        <div class="task-meta">
          <span>📋 ${t.mode || '—'}</span>
          <span>🤖 ${t.agent || '—'}</span>
          <span>🧠 ${t.model ? t.model.split('/').pop().split('-').slice(0,2).join('-') : '—'}</span>
          <span>⏱ ${timeAgo(t.startedAt)}</span>
          ${t.cost ? `<span>💰 $${t.cost.toFixed(2)}</span>` : ''}
        </div>
      </div>
      <span class="badge ${t.status}">${t.status}${t.status === 'running' ? ' ●' : ''}</span>
    </div>
  `).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function openPreview(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  document.getElementById('preview-title').textContent = `#${task.short_id} — ${task.description || '—'}`;

  let previewHTML = `
    <div class="preview-detail"><div class="label">Status</div><div class="value"><span class="badge ${task.status}">${task.status}</span></div></div>
    <div class="preview-detail"><div class="label">Mode</div><div class="value">${task.mode || '—'}</div></div>
    <div class="preview-detail"><div class="label">Agent</div><div class="value">${task.agent || '—'}</div></div>
    <div class="preview-detail"><div class="label">Model</div><div class="value">${task.model || '—'}</div></div>
    <div class="preview-detail"><div class="label">Branch</div><div class="value">${task.branch || '—'}</div></div>
    <div class="preview-detail"><div class="label">Repo</div><div class="value">${task.repo || '—'}</div></div>
    <div class="preview-detail"><div class="label">Effort</div><div class="value">${task.effort || '—'}</div></div>
    <div class="preview-detail"><div class="label">Started</div><div class="value">${task.startedAt ? new Date(task.startedAt).toLocaleString() : '—'}</div></div>
    ${task.cost ? `<div class="preview-detail"><div class="label">Cost</div><div class="value">$${task.cost.toFixed(2)}</div></div>` : ''}
  `;

  // Fetch tmux preview
  try {
    const res = await fetch('/api/preview?id=' + encodeURIComponent(id));
    const data = await res.json();
    if (data.preview) {
      previewHTML += `
        <div class="preview-detail">
          <div class="label">Agent Output</div>
          <div class="preview-output">${esc(data.preview)}</div>
        </div>`;
    }
  } catch (e) {}

  document.getElementById('preview-body').innerHTML = previewHTML;
  document.getElementById('preview-panel').classList.add('open');
}

function closePreview() {
  document.getElementById('preview-panel').classList.remove('open');
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderTasks(tasks);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePreview();
  if (e.key === '1') setFilter('all');
  if (e.key === '2') setFilter('running');
  if (e.key === '3') setFilter('done');
  if (e.key === '4') setFilter('failed');
});
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderTasks(tasks);
}

// Poll
async function refresh() {
  try {
    const res = await fetch('/api/dashboard');
    const data = await res.json();
    tasks = data.tasks || [];
    renderStats(data.stats);
    renderTasks(tasks);
    document.getElementById('uptime').textContent = '⏱ ' + data.uptime;
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('connection').style.color = 'var(--green)';
  } catch (e) {
    document.getElementById('connection').style.color = 'var(--red)';
  }
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
