[project]
name = "clawforge"
version = "0.4.0"
description = "Multi-mode coding workflow CLI — agent swarm orchestration for development tasks"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
    { name = "ClawForge Contributors" }
]
keywords = [
    "ai",
    "agent",
    "claude",
    "automation",
    "workflow",
    "cli",
    "development"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
    "Topic :: Software Development :: Code Generators",
]

# No runtime dependencies - the Python wrapper just calls the bash script
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://github.com/cyperx84/clawforge"
Repository = "https://github.com/cyperx84/clawforge"
Issues = "https://github.com/cyperx84/clawforge/issues"

[project.scripts]
clawforge = "clawforge_py.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["clawforge_py"]

[tool.hatch.build.targets.wheel.force-include]
"bin" = "clawforge_py/bin"
"lib" = "clawforge_py/lib"
"config" = "clawforge_py/config"
"VERSION" = "clawforge_py/VERSION"

[tool.hatch.build.targets.sdist]
include = [
    "/clawforge_py",
    "/bin",
    "/lib",
    "/config",
    "/VERSION",
    "/README.md",
    "/LICENSE",
]
